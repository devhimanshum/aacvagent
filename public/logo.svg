<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- Emblem background -->
  <rect width="80" height="80" rx="16" fill="#071220"/>

  <!-- Glow -->
  <radialGradient id="g" cx="50%" cy="55%" r="48%">
    <stop offset="0%" stop-color="#DC2626" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#071220" stop-opacity="0"/>
  </radialGradient>
  <rect width="80" height="80" rx="16" fill="url(#g)"/>

  <!-- Red V -->
  <polyline points="10,17 40,55 70,17"
    stroke="#7f1d1d" stroke-width="13"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="10,17 40,55 70,17"
    stroke="#DC2626" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="10,17 40,55 70,17"
    stroke="#f87171" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>

  <!-- Waves -->
  <path d="M6 65 C14 61 22 69 30 65 C38 61 46 69 54 65 C62 61 68 65 74 63"
    stroke="#2563eb" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M10 73 C18 69 26 77 34 73 C42 69 50 77 58 73 C64 70 70 73 74 71"
    stroke="#60a5fa" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Brand name -->
  <text x="96" y="42" font-family="Georgia, 'Times New Roman', serif"
    font-size="26" font-weight="700" fill="#0f172a" letter-spacing="0.3">Shipivishta</text>
  <text x="97" y="60" font-family="Arial, sans-serif"
    font-size="10.5" fill="#2563eb" letter-spacing="2" font-weight="500">SHIP MANAGEMENT PVT LTD</text>
</svg>
