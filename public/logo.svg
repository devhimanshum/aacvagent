  <!-- Brand text -->
  <text x="88" y="44" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#0B2545" letter-spacing="0.5">Shipivishta</text>
  <text x="89" y="61" font-family="Arial, sans-serif" font-size="11" fill="#2563eb" letter-spacing="1.5" font-weight="500">Ship Management Pvt Ltd</text>
</svg>
