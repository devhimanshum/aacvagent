<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <!-- Brand mark emblem (left) -->
  <rect x="2" y="2" width="72" height="72" rx="14" fill="#040e1e"/>

  <!-- Red bold V / chevron (pointing down) -->
  <polyline points="12,20 38,56 64,20"
    stroke="#C0392B" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Blue maritime waves -->
  <path d="M6 66 Q15 59 24 66 Q33 73 42 66 Q51 59 68 63"
    stroke="#2563eb" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M10 74 Q20 67 30 74 Q40 81 50 74 Q58 69 68 71"
