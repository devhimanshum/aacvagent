<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Dark background -->
  <rect width="80" height="80" rx="18" fill="#040e1e"/>

  <!-- Subtle inner glow -->
  <rect width="80" height="80" rx="18" fill="url(#glow)" opacity="0.4"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#040e1e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Red bold V / chevron (downward) -->
  <polyline points="12,20 40,58 68,20"
    stroke="#C0392B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Inner highlight -->
  <polyline points="12,20 40,58 68,20"
    stroke="#e74c3c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>

  <!-- Blue maritime waves -->
  <path d="M6 68 Q17 60 28 68 Q39 76 50 68 Q61 60 74 65"
    stroke="#2563eb" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M10 76 Q21 68 32 76 Q43 84 54 76 Q63 70 74 73"
    stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
